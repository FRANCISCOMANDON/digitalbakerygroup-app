<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Bakery Group App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --tg-theme-bg-color: #020617;
            --tg-theme-button-color: #f59e0b;
            --tg-theme-text-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: #020617;
            color: var(--tg-theme-text-color);
            overflow: hidden;
        }

        /* PANTALLA DE CARGA MEJORADA */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Esta línea ahora busca la imagen en la misma carpeta automáticamente */
            background: #020617 url('Lanzamiento digital para proyectos innovadores.jpg') no-repeat center;
            background-size: cover;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 80px;
        }

        #loader::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .loader-bar {
            width: 70%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .loader-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            box-shadow: 0 0 15px #f59e0b;
            transition: width 2s cubic-bezier(0.1, 0, 0.2, 1);
        }

        #main-content {
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease-in;
        }

        header {
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                             url('Lanzamiento digital para proyectos innovadores.jpg');
            background-size: cover;
            background-position: center;
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 3px solid var(--tg-theme-button-color);
        }

        .user-welcome {
            background: rgba(245, 158, 11, 0.9);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 12px;
            font-weight: bold;
            color: white;
        }

        .container { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: #1e293b; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #334155; }
        .product-card i { font-size: 35px; color: #f59e0b; }
        .price { display: block; color: #fbbf24; font-weight: bold; margin: 10px 0; font-size: 1.1rem; }
        .btn-add { background: var(--tg-theme-button-color); color: white; border: none; padding: 12px 0; width: 100%; border-radius: 10px; font-weight: bold; }

        #cart-status {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #10b981; color: white; padding: 12px 30px; border-radius: 50px; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="loader">
    <div style="color: white; margin-bottom: 15px; font-weight: bold; text-shadow: 2px 2px 5px black; letter-spacing: 2px;">INICIANDO...</div>
    <div class="loader-bar">
        <div class="loader-progress" id="progress"></div>
    </div>
</div>

<div id="main-content">
    <header>
        <h1 style="text-shadow: 2px 2px 10px rgba(0,0,0,1); color: white; margin: 0;">Digital Bakery</h1>
        <div class="user-welcome">Hola, <span id="user-name">Invitado</span> 🚀</div>
    </header>

    <div class="container">
        <div class="product-card">
            <i class="fas fa-bread-slice"></i>
            <h3>Croissant Gold</h3>
            <span class="price">$1.50</span>
            <button class="btn-add" onclick="addToCart('Croissant Gold', 1.50)">Añadir</button>
        </div>
        <div class="product-card">
            <i class="fas fa-cookie-bite"></i>
            <h3>Cookie Crypto</h3>
            <span class="price">$0.80</span>
            <button class="btn-add" onclick="addToCart('Cookie Crypto', 0.80)">Añadir</button>
        </div>
        <div class="product-card">
            <i class="fas fa-stroopwafel"></i>
            <h3>Baguette Tech</h3>
            <span class="price">$2.00</span>
            <button class="btn-add" onclick="addToCart('Baguette Tech', 2.00)">Añadir</button>
        </div>
        <div class="product-card">
            <i class="fas fa-cake"></i>
            <h3>Muffin Master</h3>
            <span class="price">$2.50</span>
            <button class="btn-add" onclick="addToCart('Muffin Master', 2.50)">Añadir</button>
        </div>
    </div>
</div>

<div id="cart-status"></div>

<script>
    let tg = window.Telegram.WebApp;
    let cart = [];

    tg.expand();

    window.onload = function() {
        const progress = document.getElementById('progress');
        setTimeout(() => { progress.style.width = '100%'; }, 100);
        
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('main-content').style.opacity = '1';
                    document.body.style.overflow = 'auto';
                }, 50);
            }, 500);
        }, 2600); 
    };

    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
    }

    function addToCart(name, price) {
        cart.push({name, price});
        updateMainButton();
        const status = document.getElementById('cart-status');
        status.style.display = 'block';
        status.innerText = `✅ ${name} añadido`;
        setTimeout(() => { status.style.display = 'none'; }, 1500);
        tg.HapticFeedback.impactOccurred('medium');
    }

    function updateMainButton() {
        if (cart.length > 0) {
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            tg.MainButton.text = `CONFIRMAR PEDIDO ($${total.toFixed(2)})`;
            tg.MainButton.show();
        } else {
            tg.MainButton.hide();
        }
    }

    tg.onEvent('mainButtonClicked', function() {
        tg.showConfirm("¿Procesar pedido?", function(ok) {
            if (ok) {
                tg.sendData(JSON.stringify(cart));
                tg.close();
            }
        });
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Bakery - $PAN Token</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #f59e0b;
            --bg: #020617;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Pantalla de Carga */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg) url('portada.jpg') no-repeat center;
            background-size: cover; z-index: 9999;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 80px;
        }
        .loader-bar { width: 70%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .loader-progress { width: 0%; height: 100%; background: var(--primary); transition: width 2s linear; }

        /* Interfaz Principal */
        #main-content { display: none; flex-direction: column; height: 100%; opacity: 0; transition: opacity 0.5s; }

        header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(0deg, transparent, rgba(245, 158, 11, 0.1));
        }

        .balance-container {
            font-size: 3rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
        }

        /* El Botón de Minado (El Pan) */
        .mining-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .click-area {
            position: relative;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.2) 0%, transparent 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.05s;
            -webkit-tap-highlight-color: transparent;
        }

        .click-area:active { transform: scale(0.95); }

        .main-bread {
            font-size: 120px;
            filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.5));
        }

        /* Energía */
        .energy-container {
            width: 80%;
            margin-bottom: 30px;
        }

        .energy-text {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .energy-bar {
            height: 12px;
            background: #334155;
            border-radius: 10px;
            overflow: hidden;
        }

        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            width: 100%;
            transition: width 0.2s;
        }

        /* Flotantes +1 */
        .plus-one {
            position: absolute;
            color: var(--primary);
            font-weight: bold;
            font-size: 1.5rem;
            animation: floatUp 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        footer {
            background: var(--card);
            padding: 15px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            display: flex;
            justify-content: space-around;
        }

        .nav-item {
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .nav-item.active { color: var(--primary); }
        .nav-item i { display: block; font-size: 1.5rem; margin-bottom: 5px; }

    </style>
</head>
<body>

<div id="loader">
    <div style="color: white; margin-bottom: 15px; font-weight: bold;">HORNEANDO $PAN...</div>
    <div class="loader-bar"><div class="loader-progress" id="progress"></div></div>
</div>

<div id="main-content">
    <header>
        <div class="user-welcome">@<span id="user-name">Usuario</span></div>
        <div class="balance-container">
            <i class="fas fa-bread-slice"></i>
            <span id="balance">0</span>
        </div>
        <div style="font-size: 0.9rem; color: #94a3b8;">Tokens $PAN</div>
    </header>

    <div class="mining-section">
        <div class="click-area" id="pan-btn">
            <span class="main-bread">🍞</span>
        </div>
    </div>

    <center>
        <div class="energy-container">
            <div class="energy-text">
                <span>⚡ Energía</span>
                <span id="energy-val">1000/1000</span>
            </div>
            <div class="energy-bar">
                <div class="energy-fill" id="energy-fill"></div>
            </div>
        </div>
    </center>

    <footer>
        <div class="nav-item active">
            <i class="fas fa-hand-pointer"></i>
            Tap
        </div>
        <div class="nav-item" onclick="tg.showAlert('Tienda próximamente')">
            <i class="fas fa-store"></i>
            Tienda
        </div>
        <div class="nav-item" onclick="tg.showAlert('Invita amigos para ganar $PAN')">
            <i class="fas fa-users"></i>
            Amigos
        </div>
    </footer>
</div>

<script>
    let tg = window.Telegram.WebApp;
    let balance = parseInt(localStorage.getItem('pan_balance')) || 0;
    let energy = 1000;
    const maxEnergy = 1000;

    tg.expand();
    document.getElementById('balance').innerText = balance.toLocaleString();

    // Loader
    window.onload = () => {
        document.getElementById('progress').style.width = '100%';
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('main-content').style.opacity = '1';
        }, 2000);
    };

    if (tg.initDataUnsafe?.user) {
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name;
    }

    // Lógica de Clic
    const panBtn = document.getElementById('pan-btn');
    
    panBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (energy > 0) {
            // Incrementar balance
            balance += 1;
            energy -= 1;
            updateUI();
            
            // Efecto visual +1
            const touch = e.touches[0];
            createPlusOne(touch.clientX, touch.clientY);
            
            // Feedback
            tg.HapticFeedback.impactOccurred('light');
            localStorage.setItem('pan_balance', balance);
        } else {
            tg.HapticFeedback.notificationOccurred('error');
        }
    });

    function updateUI() {
        document.getElementById('balance').innerText = balance.toLocaleString();
        document.getElementById('energy-val').innerText = `${energy}/${maxEnergy}`;
        const percent = (energy / maxEnergy) * 100;
        document.getElementById('energy-fill').style.width = `${percent}%`;
    }

    function createPlusOne(x, y) {
        const p = document.createElement('div');
        p.className = 'plus-one';
        p.innerText = '+1';
        p.style.left = `${x}px`;
        p.style.top = `${y}px`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }

    // Recuperación de energía lenta
    setInterval(() => {
        if (energy < maxEnergy) {
            energy += 1;
            updateUI();
        }
    }, 1500);

</script>
</body>
</html>

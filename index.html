<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Bakery Group - Virtual Crypto Bakery</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #f59e0b;
            --bg: #020617;
            --card: #1e293b;
            --text: #f8fafc;
            --ton: #0088cc;
            --success: #10b981;
            --accent: #8b5cf6;
            --gold: #facc15;
            --diamond: #06b6d4;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; background-color: var(--bg); color: var(--text);
            overflow: hidden; display: flex; flex-direction: column; height: 100vh;
            -webkit-user-select: none; user-select: none;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; z-index: 1000; min-height: 50px; }
        
        .settings-btn {
            background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 10px; border-radius: 12px; cursor: pointer; font-size: 1.2rem;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 10000;
        }
        .modal-content {
            background: #2d1b0d; border: 2px solid var(--primary); border-radius: 25px;
            width: 85%; max-width: 350px; padding: 25px; position: relative; text-align: center;
            max-height: 80vh; overflow-y: auto;
        }
        .modal-header { background: var(--primary); color: #2d1b0d; padding: 5px 20px; border-radius: 20px; display: inline-block; font-weight: 900; margin-bottom: 20px; }
        
        .setting-item {
            background: #fef3c7; color: #2d1b0d; margin: 10px 0; padding: 12px 15px;
            border-radius: 15px; display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 0.9rem;
        }
        
        /* Selector de idioma */
        .lang-select {
            background: #fef3c7; border: none; font-weight: bold; color: #2d1b0d; outline: none;
        }

        .faq-box {
            text-align: left; background: rgba(254, 243, 199, 0.1); border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 15px; padding: 15px; margin-top: 15px; font-size: 0.8rem; color: #fef3c7;
        }
        .faq-box b { color: var(--primary); display: block; margin-top: 10px; }
        .close-modal { position: absolute; top: 10px; right: 15px; color: white; font-size: 1.5rem; font-weight: bold; cursor: pointer; }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg) url('portada.jpg') no-repeat center;
            background-size: cover; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        
        .loader-bar { width: 220px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-top: 25px; overflow: hidden; }
        .loader-progress { width: 0%; height: 100%; background: var(--primary); transition: width 3.5s linear; }

        #main-content { display: none; flex-direction: column; height: 100%; opacity: 0; transition: opacity 0.5s; }
        .view { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 130px; }
        .view.active { display: flex; }

        header { padding: 10px 20px; text-align: center; }
        .app-title { font-size: 0.85rem; font-weight: 800; color: var(--primary); letter-spacing: 1.8px; text-transform: uppercase; }
        .balance-container { font-size: 2.3rem; font-weight: 900; color: white; font-family: 'Courier New', monospace; margin: 8px 0; text-shadow: 0 0 15px rgba(245,158,11,0.5); }
        .pps-badge { font-size: 0.75rem; color: var(--success); background: rgba(16, 185, 129, 0.15); padding: 5px 14px; border-radius: 20px; font-weight: bold; display: inline-block; border: 1px solid rgba(16, 185, 129, 0.2); }

        .bakery-display { 
            background: rgba(30, 41, 59, 0.5); border-radius: 20px; margin: 10px 20px; padding: 12px;
            display: flex; justify-content: center; gap: 18px; border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
        }
        .bakery-item { font-size: 1.3rem; opacity: 0.2; filter: grayscale(1); transition: 0.4s ease-out; }
        .bakery-item.active { opacity: 1; filter: grayscale(0) drop-shadow(0 0 8px var(--primary)); }

        .mining-section { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .bread-btn { font-size: 160px; cursor: pointer; transition: transform 0.1s; filter: drop-shadow(0 0 35px rgba(245,158,11,0.4)); -webkit-tap-highlight-color: transparent; }
        .bread-btn:active { transform: scale(0.85); }
        .bread-btn.disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; pointer-events: none; }

        .plus-number { 
            position: absolute; color: var(--primary); font-weight: 900; 
            font-size: 1.8rem; font-family: Arial, sans-serif; pointer-events: none; 
            animation: floatUp 0.8s ease-out forwards; z-index: 100; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-180px); opacity: 0; } }

        .item-card { 
            background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 20px; margin: 10px 15px; 
            padding: 18px; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 18px;
        }
        .item-info { flex: 1; }
        .item-info h4 { margin: 0; font-size: 0.95rem; font-weight: bold; color: white; }
        .item-info p { margin: 5px 0 10px 0; font-size: 0.7rem; color: #94a3b8; }
        .btn-buy { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }

        .invest-card { 
            background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 20px; margin: 12px 15px; 
            padding: 22px; border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        .invest-price { font-size: 1.4rem; font-weight: 800; color: var(--success); display: block; margin-bottom: 5px; }
        .btn-invest { background: var(--ton); color: white; border: none; padding: 14px; width: 100%; border-radius: 16px; font-weight: 800; cursor: pointer; margin-top: 15px; }

        footer { 
            position: fixed; bottom: 0; width: 100%; background: rgba(15, 23, 42, 0.98); 
            padding: 18px 0; display: flex; justify-content: space-around; 
            border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; backdrop-filter: blur(10px);
        }
        .nav-item { color: #64748b; text-align: center; font-size: 0.65rem; flex: 1; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--primary); transform: translateY(-2px); transition: transform 0.2s; }
        .nav-item i { display: block; font-size: 1.4rem; margin-bottom: 6px; }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    <source src="bakery-lofi.mp3" type="audio/mpeg">
</audio>

<div id="loader">
    <h1 style="color: var(--primary); letter-spacing: 4px; font-weight: 900; font-size: 1.8rem; margin: 0; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">DIGITAL BAKERY</h1>
    <div class="loader-bar"><div class="loader-progress" id="progress"></div></div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal-content">
        <div class="close-modal" onclick="toggleModal(false)">×</div>
        <div class="modal-header" id="txt-settings-title">AJUSTES Y FAQ</div>
        
        <div class="setting-item">
            <span>🌐 <span id="txt-lang-label">Idioma</span></span>
            <select class="lang-select" id="lang-switcher" onchange="changeLanguage(this.value)">
                <option value="es">Español</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
            </select>
        </div>

        <div class="setting-item">
            <span>🎵 <span id="txt-music-label">Música</span></span>
            <input type="checkbox" id="music-toggle" onclick="toggleMusic()">
        </div>
        
        <div class="faq-box" id="faq-content">
            </div>
    </div>
</div>

<div id="main-content">
    <div class="top-bar">
        <button class="settings-btn" onclick="toggleModal(true)"><i class="fas fa-cog"></i></button>
        <div id="ton-connect-btn"></div>
    </div>

    <div id="view-mine" class="view active">
        <header>
            <div class="app-title" id="txt-factory-title">Crypto Factory</div>
            <div class="balance-container" id="balance">0.000000000</div>
            <div id="pps-display" class="pps-badge">+0.000000000 $PAN / s</div>
        </header>

        <div class="bakery-display">
            <span class="bakery-item" id="icon-casero">₿</span> <span class="bakery-item" id="icon-industrial">Ξ</span> <span class="bakery-item" id="icon-maestro">☀️</span> </div>

        <div class="mining-section"><div class="bread-btn" id="mine-btn">🍞</div></div>

        <div style="padding: 10px 20px; text-align: center;">
            <button class="btn-buy" id="claim-btn" style="background: var(--success); width: 85%; padding: 12px; font-size: 0.9rem;">
                <i class="fas fa-hand-holding-usd"></i> <span id="txt-claim-btn">Cobrar $PAN Pasivos</span> (<span id="claimable-val">0.000000000</span>)
            </button>
        </div>

        <div style="padding: 15px; text-align: center;">
            <div style="display: flex; justify-content: space-between; width: 85%; margin: 0 auto; font-size: 0.75rem; font-weight: bold; color: #94a3b8; margin-bottom: 6px;">
                <span id="txt-energy-label">ENERGÍA DE HORNO</span><span id="energy-text">1000/1000</span>
            </div>
            <div style="width: 85%; height: 7px; background: #1e293b; border-radius: 10px; margin: 0 auto; overflow: hidden;"><div id="energy-fill" style="height: 100%; background: var(--primary); width: 100%;"></div></div>
        </div>
    </div>

    <div id="view-shop" class="view">
        <header><div class="app-title" id="nav-equipos">Equipos</div></header>
        <div class="item-card"><div style="font-size: 2rem;">₿</div><div class="item-info"><h4>Miner Casero</h4><p>+0.000000001 $PAN/s</p><div style="font-size: 0.8rem; color: var(--primary);">0.000005 $PAN</div></div><button class="btn-buy" onclick="comprarHorno('casero', 0.000005, 0.000000001)">COMPRAR</button></div>
    </div>

    <footer>
        <div class="nav-item active" onclick="switchView('view-mine', this)"><i class="fas fa-microchip"></i><span id="nav-factory">FACTORY</span></div>
        <div class="nav-item" onclick="switchView('view-shop', this)"><i class="fas fa-tools"></i><span id="nav-shop">EQUIPOS</span></div>
        <div class="nav-item" onclick="switchView('view-invest', this)"><i class="fas fa-coins"></i>USDT</div>
        <div class="nav-item" onclick="switchView('view-friends', this)"><i class="fas fa-user-friends"></i><span id="nav-friends">AMIGOS</span></div>
    </footer>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const storageKey = 'dbakery_val_v6_restored';
    
    // TRADUCCIONES
    const i18n = {
        es: {
            settings: "AJUSTES Y FAQ",
            lang: "Idioma",
            music: "Música",
            claim: "Cobrar $PAN Pasivos",
            energy: "ENERGÍA DE HORNO",
            factory: "FACTORY",
            shop: "EQUIPOS",
            friends: "AMIGOS",
            faq: "<b>¿Qué es Digital Bakery?</b> Es una incubadora blockchain. <b>¿Cómo gano?</b> Minando y comprando hornos."
        },
        en: {
            settings: "SETTINGS & FAQ",
            lang: "Language",
            music: "Music",
            claim: "Claim Passive $PAN",
            energy: "OVEN ENERGY",
            factory: "FACTORY",
            shop: "EQUIPMENT",
            friends: "FRIENDS",
            faq: "<b>What is Digital Bakery?</b> It is a blockchain incubator. <b>How do I earn?</b> By mining and buying ovens."
        },
        fr: {
            settings: "PARAMÈTRES & FAQ",
            lang: "Langue",
            music: "Musique",
            claim: "Récupérer $PAN Passif",
            energy: "ÉNERGIE DU FOUR",
            factory: "USINE",
            shop: "ÉQUIPEMENT",
            friends: "AMIS",
            faq: "<b>Qu'est-ce que Digital Bakery ?</b> C'est un incubateur blockchain. <b>Comment gagner ?</b> En minant et en achetant des fours."
        }
    };

    let currentLang = localStorage.getItem('db_lang') || 'es';

    function changeLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('db_lang', lang);
        updateText();
    }

    function updateText() {
        const t = i18n[currentLang];
        document.getElementById('txt-settings-title').innerText = t.settings;
        document.getElementById('txt-lang-label').innerText = t.lang;
        document.getElementById('txt-music-label').innerText = t.music;
        document.getElementById('txt-claim-btn').innerText = t.claim;
        document.getElementById('txt-energy-label').innerText = t.energy;
        document.getElementById('nav-factory').innerText = t.factory;
        document.getElementById('nav-shop').innerText = t.shop;
        document.getElementById('nav-friends').innerText = t.friends;
        document.getElementById('faq-content').innerHTML = t.faq;
    }

    // AUDIO LOGIC
    const music = document.getElementById('bg-music');
    function toggleMusic() {
        const isChecked = document.getElementById('music-toggle').checked;
        if (isChecked) {
            music.play().catch(() => {
                tg.showAlert("Haz clic en la pantalla para activar el audio");
            });
        } else {
            music.pause();
        }
        tg.HapticFeedback.selectionChanged();
    }

    // Resto de lógica de funcionamiento (Balance, Clicks, etc)
    let balance = 0;
    let pps = 0;
    let energy = 1000;
    let hornos = { casero: 0, industrial: 0, maestro: 0 };
    let claimablePassive = 0;

    function toggleModal(show) {
        document.getElementById('settings-modal').style.display = show ? 'flex' : 'none';
        tg.HapticFeedback.impactOccurred('medium');
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance.toFixed(9);
        document.getElementById('pps-display').innerText = `+${pps.toFixed(9)} $PAN / s`;
        document.getElementById('energy-text').innerText = `${energy}/1000`;
        document.getElementById('energy-fill').style.width = (energy/10) + '%';
        document.getElementById('claimable-val').innerText = claimablePassive.toFixed(9);
    }

    // Inicialización
    window.addEventListener('load', () => {
        document.getElementById('progress').style.width = '100%';
        document.getElementById('lang-switcher').value = currentLang;
        updateText();
        updateUI();
        
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('main-content').style.opacity = '1';
        }, 3500);
    });

    function switchView(viewId, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        el.classList.add('active');
        tg.HapticFeedback.impactOccurred('light');
    }

    document.getElementById('mine-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (energy > 0) {
            balance += 0.000000001; 
            energy -= 1;
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }
    });

    setInterval(() => {
        if (energy < 1000) energy++;
        if (pps > 0) claimablePassive += pps;
        updateUI();
    }, 1000);
</script>

</body>
</html>

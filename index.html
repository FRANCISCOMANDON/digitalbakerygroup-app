<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Bakery Group - TON</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #f59e0b;
            --bg: #020617;
            --card: #1e293b;
            --text: #f8fafc;
            --ton: #0088cc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; background-color: var(--bg); color: var(--text);
            overflow: hidden; display: flex; flex-direction: column; height: 100vh;
        }

        /* AJUSTE DEL BOTÓN PARA QUE NO TAPE NADA */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            padding: 15px;
            z-index: 1000;
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg) url('portada.jpg') no-repeat center;
            background-size: cover; z-index: 9999;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 80px;
        }
        #loader::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: -1; }
        .loader-bar { width: 70%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .loader-progress { width: 0%; height: 100%; background: var(--primary); transition: width 2s linear; }

        #main-content { display: none; flex-direction: column; height: 100%; opacity: 0; transition: opacity 0.5s; }

        .view { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 120px; }
        .view.active { display: flex; }

        header { padding: 10px 20px; text-align: center; }
        .app-title { font-size: 1.1rem; font-weight: bold; color: var(--primary); letter-spacing: 2px; margin-bottom: 10px; }
        .balance-container { font-size: 2.2rem; font-weight: 800; color: var(--primary); font-family: monospace; }

        .mining-section { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .bread-btn { font-size: 170px; cursor: pointer; transition: transform 0.05s; filter: drop-shadow(0 0 25px rgba(245,158,11,0.3)); -webkit-tap-highlight-color: transparent; }
        .bread-btn:active { transform: scale(0.85); }

        /* Efecto Flotante */
        .plus-number { position: absolute; color: #fbbf24; font-weight: bold; font-size: 1.2rem; pointer-events: none; animation: floatUp 0.8s ease-out forwards; text-shadow: 0 0 8px black; z-index: 100; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-150px); opacity: 0; } }

        .invest-card { background: var(--card); border-radius: 20px; margin: 15px; padding: 20px; border: 1px solid #334155; }
        .btn-invest { background: var(--ton); color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }

        footer { position: fixed; bottom: 0; width: 100%; background: #0f172a; padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #1e293b; }
        .nav-item { color: #64748b; text-align: center; font-size: 0.75rem; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { display: block; font-size: 1.4rem; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="ton-connect-btn"></div>
</div>

<div id="loader">
    <div style="color: white; margin-bottom: 15px; font-weight: bold;">CONECTANDO WEB3...</div>
    <div class="loader-bar"><div class="loader-progress" id="progress"></div></div>
</div>

<div id="main-content">
    
    <div id="view-mine" class="view active">
        <header>
            <div class="app-title">Digital Bakery Group</div>
            <div class="balance-container" id="balance">0.000000000</div>
            <div id="wallet-status" style="font-size: 0.7rem; color: #64748b;">Wallet Desconectada</div>
        </header>
        <div class="mining-section">
            <div class="bread-btn" id="mine-btn">🍞</div>
        </div>
        <div style="padding: 20px; text-align: center;">
            <div id="energy-text" style="font-size: 0.8rem; font-weight: bold;">⚡ 1000/1000</div>
            <div style="width: 85%; height: 10px; background: #1e293b; border-radius: 10px; margin: 10px auto; overflow: hidden;"><div id="energy-fill" style="height: 100%; background: var(--primary); width: 100%;"></div></div>
        </div>
    </div>

    <div id="view-invest" class="view">
        <header><div class="app-title">Invertir en $PAN</div></header>
        <div class="invest-card">
            <h3>Pack Semilla 🌾</h3>
            <span style="font-size: 1.2rem; display: block; margin-bottom: 10px;">1 USDT</span>
            <button class="btn-invest" onclick="pagarConWallet(1)">Pagar con Wallet</button>
        </div>
        <div class="invest-card">
            <h3>Socio Industrial 💎</h3>
            <span style="font-size: 1.2rem; display: block; margin-bottom: 10px;">50 USDT</span>
            <button class="btn-invest" onclick="pagarConWallet(50)">Pagar con Wallet</button>
        </div>
    </div>

    <footer>
        <div class="nav-item active" onclick="switchView('view-mine', this)"><i class="fas fa-fire"></i>MINAR</div>
        <div class="nav-item" onclick="switchView('view-invest', this)"><i class="fas fa-wallet"></i>INVERTIR</div>
        <div class="nav-item" onclick="tg.showAlert('Próximamente')"><i class="fas fa-users"></i>AMIGOS</div>
    </footer>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let balance = parseFloat(localStorage.getItem('pan_v4')) || 0;
    let energy = 1000;

    // INICIALIZAR TON CONNECT CON TU MANIFIESTO LOCAL
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: window.location.origin + window.location.pathname + 'tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
    });

    tg.expand();

    window.onload = () => {
        document.getElementById('progress').style.width = '100%';
        updateDisplay();
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('main-content').style.opacity = '1';
        }, 2000);
    };

    tonConnectUI.onStatusChange(wallet => {
        if (wallet) {
            const addr = wallet.account.address;
            document.getElementById('wallet-status').innerText = "Conectado: " + addr.substring(0,6) + "..." + addr.substring(addr.length-4);
            document.getElementById('wallet-status').style.color = "#10b981";
        }
    });

    function switchView(viewId, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        el.classList.add('active');
    }

    document.getElementById('mine-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (energy > 0) {
            balance += 0.000000001;
            energy -= 1;
            const touch = e.changedTouches[0];
            createPlusOne(touch.clientX, touch.clientY);
            tg.HapticFeedback.impactOccurred('medium');
            updateDisplay();
            localStorage.setItem('pan_v4', balance.toFixed(9));
        }
    });

    function createPlusOne(x, y) {
        const p = document.createElement('div');
        p.className = 'plus-number'; p.innerText = '+0.000000001';
        p.style.left = (x - 60) + 'px'; p.style.top = (y - 50) + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }

    function updateDisplay() {
        document.getElementById('balance').innerText = balance.toFixed(9);
        document.getElementById('energy-text').innerText = `⚡ ${energy}/1000`;
        document.getElementById('energy-fill').style.width = `${(energy/1000)*100}%`;
    }

    async function pagarConWallet(monto) {
        if (!tonConnectUI.connected) {
            tg.showAlert("Conecta tu Wallet arriba.");
            return;
        }
        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 60,
            messages: [{
                address: "UQCWJafwk-4iQJkxDjqaBD4NB4cBmswgGJVENe-HyCaO2FAV",
                amount: (monto * 1000000000).toString(), // Monto en TON
            }]
        };
        try {
            await tonConnectUI.sendTransaction(transaction);
            tg.showAlert("¡Transacción enviada!");
        } catch (e) { tg.showAlert("Cancelado."); }
    }

    setInterval(() => { if (energy < 1000) { energy += 1; updateDisplay(); } }, 1000);
</script>
</body>
</html>

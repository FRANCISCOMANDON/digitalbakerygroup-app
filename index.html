<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Bakery Group - $PAN Token</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #f59e0b;
            --bg: #020617;
            --text: #f8fafc;
            --secondary-text: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-user-select: none; user-select: none;
        }

        /* Splash Screen (usando portada.jpg) */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg) url('portada.jpg') no-repeat center;
            background-size: cover; z-index: 9999;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 80px;
        }
        #loader::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: -1; }
        .loader-bar { width: 70%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .loader-progress { width: 0%; height: 100%; background: var(--primary); transition: width 2s linear; }

        #main-content { display: none; flex-direction: column; height: 100%; opacity: 0; transition: opacity 0.5s ease-in; }

        header { padding: 30px 20px 10px; text-align: center; }
        
        /* Nombre de la App Restaurado */
        .app-title {
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }

        .balance-label { font-size: 0.8rem; color: var(--secondary-text); }
        
        .balance-container {
            font-size: 2.3rem;
            font-weight: 800;
            color: var(--primary);
            margin: 5px 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .mining-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* EL PAN REALISTA PREMIUM (Sin imagen externa) */
        .bread-btn {
            font-size: 180px; /* Tamaño gigante */
            cursor: pointer;
            transition: transform 0.05s, filter 0.1s;
            /* Sombra dorada suave */
            filter: drop-shadow(0 0 30px rgba(245, 158, 11, 0.3));
            -webkit-tap-highlight-color: transparent;
        }

        .bread-btn:active {
            transform: scale(0.93) rotate(-2deg);
            filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.2));
        }

        .energy-section { padding: 20px; text-align: center; }
        .energy-bar { width: 85%; height: 14px; background: #1e293b; border-radius: 10px; margin: 10px auto; overflow: hidden; border: 1px solid #334155; }
        .energy-fill { height: 100%; background: linear-gradient(90deg, #f59e0b, #fbbf24); width: 100%; transition: width 0.2s; }

        .plus-number {
            position: absolute;
            color: #fbbf24;
            font-weight: bold;
            font-size: 1.3rem;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 0 0 8px black;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-140px) scale(1.3); opacity: 0; }
        }

        footer {
            background: #0f172a;
            padding: 20px 10px;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #1e293b;
        }

        .nav-item { color: #64748b; text-align: center; font-size: 0.75rem; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { display: block; font-size: 1.5rem; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="loader">
    <div style="color: white; margin-bottom: 15px; font-weight: bold; letter-spacing: 1px;">CARGANDO $PAN PROTOCOL...</div>
    <div class="loader-bar"><div class="loader-progress" id="progress"></div></div>
</div>

<div id="main-content">
    <header>
        <div class="app-title">Digital Bakery Group</div>
        <div class="balance-label">Tu Balance de $PAN</div>
        <div class="balance-container" id="balance">0.000000000</div>
    </header>

    <div class="mining-section">
        <div class="bread-btn" id="mine-btn">🍞</div>
    </div>

    <div class="energy-section">
        <div style="display: flex; justify-content: space-between; width: 85%; margin: 0 auto; font-size: 0.9rem; font-weight: bold;">
            <span>⚡ Energía para Hornear</span>
            <span id="energy-text">1000/1000</span>
        </div>
        <div class="energy-bar">
            <div class="energy-fill" id="energy-fill"></div>
        </div>
    </div>

    <footer>
        <div class="nav-item active"><i class="fas fa-hand-pointer"></i>HORNAR</div>
        <div class="nav-item" onclick="tg.showAlert('Próximamente: Mercado de $PAN')"><i class="fas fa-coins"></i>MERCADO</div>
        <div class="nav-item" onclick="tg.showAlert('Gana extra invitando amigos')"><i class="fas fa-users"></i>COMUNIDAD</div>
    </footer>
</div>

<script>
    let tg = window.Telegram.WebApp;
    // Guardamos con 9 decimales
    let balance = parseFloat(localStorage.getItem('pan_v3')) || 0.000000000;
    let energy = 1000;
    const maxEnergy = 1000;
    const clickValue = 0.000000001; // Valor por cada clic

    tg.expand();

    window.onload = () => {
        document.getElementById('progress').style.width = '100%';
        updateDisplay();
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                document.getElementById('main-content').style.opacity = '1';
            }, 500);
        }, 2100);
    };

    const mineBtn = document.getElementById('mine-btn');
    
    // Multi-touch limitado a 3 dedos máximo
    mineBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        
        // Contamos un máximo de 3 dedos
        const touchesToCount = Math.min(e.changedTouches.length, 3);
        
        for(let i=0; i < touchesToCount; i++) {
            if (energy > 0) {
                balance += clickValue;
                energy -= 1;
                
                const touch = e.changedTouches[i];
                showFloatingEffect(touch.clientX, touch.clientY);
                tg.HapticFeedback.impactOccurred('medium');
            } else {
                tg.HapticFeedback.notificationOccurred('error');
            }
        }
        updateDisplay();
        localStorage.setItem('pan_v3', balance.toFixed(9));
    });

    function updateDisplay() {
        document.getElementById('balance').innerText = balance.toFixed(9);
        document.getElementById('energy-text').innerText = `${energy}/${maxEnergy}`;
        document.getElementById('energy-fill').style.width = `${(energy/maxEnergy)*100}%`;
    }

    function showFloatingEffect(x, y) {
        const num = document.createElement('div');
        num.className = 'plus-number';
        num.innerText = '+0.000000001'; 
        num.style.left = (x - 50) + 'px';
        num.style.top = (y - 50) + 'px';
        document.body.appendChild(num);
        setTimeout(() => num.remove(), 750);
    }

    // Recuperar energía lenta
    setInterval(() => {
        if (energy < maxEnergy) {
            energy += 1; // Recupera 1 punto por segundo
            updateDisplay();
        }
    }, 1000);
</script>
</body>
</html>
